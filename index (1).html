<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Belajar Bahasa Indonesia · 印尼语学习</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Belajar">
<meta name="theme-color" content="#F5F0E8">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F0E8;--surface:#FFFDF8;--s2:#F0EBE0;--accent:#C8543A;--green:#2D6A4F;--text:#1A1612;--t2:#6B6255;--t3:#A89F92;--border:rgba(26,22,18,0.1);--r:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 calc(72px + env(safe-area-inset-bottom));-webkit-tap-highlight-color:transparent}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px 12px;position:sticky;top:0;z-index:100}
.header-row{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.header h1{font-family:'DM Serif Display',serif;font-size:20px}
.header-sub{font-size:12px;color:var(--t3);font-style:italic}
.vpill{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:100px;background:var(--s2);color:var(--t2)}
.vpill.ok{background:#D8EFE6;color:#1A5C3A}.vpill.warn{background:#FDE8D0;color:#7A3A10}
.vdot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.nav{display:flex;gap:4px;padding:10px 20px;background:var(--bg);border-bottom:1px solid var(--border);overflow-x:auto}
.nav::-webkit-scrollbar{display:none}
.nb{flex-shrink:0;padding:6px 14px;border-radius:100px;border:1px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--t2);cursor:pointer;transition:all .2s;white-space:nowrap}
.nb.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.nb:hover:not(.active){background:var(--s2)}
.screen{display:none;padding:16px 20px}.screen.active{display:block}
.slbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:10px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:10px 8px;text-align:center}
.slbl2{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);margin-bottom:4px}
.sval{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text)}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.tc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;cursor:pointer;transition:all .2s;position:relative}
.tc:hover{border-color:var(--accent)}.tc.sel{border-color:var(--green);background:#D8EFE6}
.tc-icon{font-size:20px;margin-bottom:6px}.tc-name{font-size:13px;font-weight:500;color:var(--text)}
.tc-count{font-size:10px;color:var(--t3);margin-top:2px}.tc-prog{position:absolute;bottom:8px;right:10px;font-size:10px;color:var(--green);font-weight:500}
.daily-banner{background:var(--text);color:var(--bg);border-radius:var(--r);padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.db-left h3{font-family:'DM Serif Display',serif;font-size:16px;margin-bottom:2px}.db-left p{font-size:11px;opacity:.7}.db-right{font-size:22px}
.btn-p{width:100%;padding:13px;border-radius:var(--r);background:var(--text);color:var(--bg);border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .2s}
.btn-p:hover{opacity:.85}
.btn-o{width:100%;padding:11px;border-radius:var(--r);background:transparent;color:var(--t2);border:1px solid var(--border);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;margin-top:8px}
.btn-o:hover{background:var(--s2)}
.pw{background:var(--s2);border-radius:100px;height:4px;margin-bottom:4px;overflow:hidden}
.pf{height:100%;border-radius:100px;background:var(--green);transition:width .4s ease}
.plbl{font-size:11px;color:var(--t3);margin-bottom:14px}
.fc{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px 20px;text-align:center;cursor:pointer;margin-bottom:10px;transition:border-color .2s;min-height:190px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.fc:hover{border-color:var(--accent)}
.fc-word{font-family:'DM Serif Display',serif;font-size:30px;color:var(--text);margin-bottom:6px}
.fc-hint{font-size:12px;color:var(--t3)}.fc-zh{font-size:20px;font-weight:500;color:var(--green);margin-top:12px;display:none}
.fc-pron{font-size:11px;color:var(--t3);margin-top:4px;font-style:italic;display:none}
.fc-cat{font-size:10px;color:var(--accent);margin-top:6px;display:none;text-transform:uppercase;letter-spacing:.5px}
.fc.flipped .fc-zh,.fc.flipped .fc-pron,.fc.flipped .fc-cat{display:block}.fc.flipped .fc-hint{display:none}
.spk{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:100px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:11px;color:var(--t2);cursor:pointer;transition:all .2s;margin-top:8px}
.spk:hover{border-color:var(--green);color:var(--green)}.spk.playing{border-color:var(--green);color:var(--green);background:#D8EFE6}
.spk svg{width:12px;height:12px;flex-shrink:0}
.ca{display:flex;gap:8px;margin-bottom:10px}
.btn-again{flex:1;padding:11px;border-radius:var(--r);border:1px solid #E8C4BA;background:#FBF0EE;color:#993C1D;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
.btn-know{flex:1;padding:11px;border-radius:var(--r);border:1px solid #A8D8C0;background:#D8EFE6;color:#1A5C3A;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
.qq{font-family:'DM Serif Display',serif;font-size:18px;color:var(--text);margin-bottom:14px;line-height:1.4}
.qopts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.qopt{padding:12px 8px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);text-align:center;transition:all .2s;line-height:1.4}
.qopt:hover:not(.disabled){border-color:var(--accent);background:var(--s2)}
.qopt.correct{background:#D8EFE6;border-color:var(--green);color:#1A5C3A}.qopt.wrong{background:#FBF0EE;border-color:var(--accent);color:#7A1A0A}.qopt.disabled{cursor:default}
.qfb{font-size:12px;color:var(--t2);text-align:center;margin-bottom:10px;min-height:16px}
.qnxt{width:100%;padding:11px;border-radius:var(--r);background:var(--text);color:var(--bg);border:none;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;display:none}
.cwrap{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.bub{max-width:82%;padding:10px 12px;border-radius:14px;font-size:13px;line-height:1.5}
.bub-id{background:var(--surface);border:1px solid var(--border);color:var(--text);align-self:flex-start;border-bottom-left-radius:3px}
.bub-you{background:var(--text);color:var(--bg);align-self:flex-end;border-bottom-right-radius:3px}
.bub-trans{font-size:10px;color:var(--t3);margin-top:3px;font-style:italic}
.copt{width:100%;padding:10px 12px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);text-align:left;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);cursor:pointer;transition:all .2s;margin-bottom:6px}
.copt:hover{border-color:var(--green)}.copt.picked{background:var(--text);color:var(--bg);border-color:var(--text)}
.cnote{font-size:11px;color:var(--t2);padding:8px 12px;background:var(--s2);border-radius:var(--r);margin-bottom:8px;border-left:3px solid var(--green)}
.pcat{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin:14px 0 6px}
.pitem{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.ptexts{flex:1}.pid{font-size:14px;font-weight:500;color:var(--text)}.pzh{font-size:11px;color:var(--t3);margin-top:1px}.ppron{font-size:10px;color:var(--green);margin-top:1px;font-style:italic}
.sw{position:relative;margin-bottom:12px}
.sw input{width:100%;padding:10px 14px 10px 36px;border-radius:100px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none}
.sw input:focus{border-color:var(--green)}.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
</style>
</head>
<body>
<div class="header">
  <div class="header-row"><h1>Belajar Bahasa</h1><span class="header-sub">500词印尼语</span></div>
  <div class="vpill" id="vpill"><span class="vdot"></span><span id="vlbl">检测语音...</span></div>
</div>
<div class="nav">
  <button class="nb active" onclick="showScreen('home')">主页</button>
  <button class="nb" onclick="showScreen('flash')">词汇卡</button>
  <button class="nb" onclick="showScreen('quiz')">测验</button>
  <button class="nb" onclick="showScreen('convo')">对话</button>
  <button class="nb" onclick="showScreen('phrase')">短语本</button>
</div>
<div id="screen-home" class="screen active">
  <div class="stats">
    <div class="stat"><div class="slbl2">已掌握</div><div class="sval" id="h-known">0</div></div>
    <div class="stat"><div class="slbl2">正确率</div><div class="sval" id="h-acc">—</div></div>
    <div class="stat"><div class="slbl2">连续天</div><div class="sval" id="h-streak">0</div></div>
    <div class="stat"><div class="slbl2">总进度</div><div class="sval" id="h-pct">0%</div></div>
  </div>
  <div class="daily-banner" onclick="startDaily()">
    <div class="db-left"><h3>今日学习</h3><p id="daily-desc">每天10个新词，坚持50天掌握500词</p></div>
    <div class="db-right">→</div>
  </div>
  <div class="slbl">选择主题</div>
  <div class="tgrid" id="topic-grid"></div>
  <button class="btn-p" onclick="showScreen('flash')">开始学习所选主题 →</button>
</div>
<div id="screen-flash" class="screen">
  <div class="pw"><div class="pf" id="f-prog" style="width:0%"></div></div>
  <div class="plbl" id="f-lbl">第 1 / 10 张</div>
  <div class="fc" id="fc" onclick="flipCard()">
    <div class="fc-word" id="f-word"></div>
    <div class="fc-hint">点击翻转</div>
    <div class="fc-zh" id="f-zh"></div>
    <div class="fc-pron" id="f-pron"></div>
    <div class="fc-cat" id="f-cat"></div>
  </div>
  <div style="text-align:center">
    <button class="spk" id="spk-flash" onclick="event.stopPropagation();speakCurrent()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 5.5h2.5L8 2.5v11L4.5 10.5H2z"/><path d="M10 5.5c1.1.6 1.8 1.7 1.8 3s-.7 2.4-1.8 3"/><path d="M12.5 3c2 1.1 3.3 3.2 3.3 5.5s-1.3 4.4-3.3 5.5"/></svg>听发音
    </button>
  </div><br>
  <div class="ca">
    <button class="btn-again" onclick="cardResult(false)">再练一次</button>
    <button class="btn-know" onclick="cardResult(true)">✓ 记住了</button>
  </div>
  <button class="btn-o" onclick="showScreen('home')">← 返回</button>
</div>
<div id="screen-quiz" class="screen">
  <div class="pw"><div class="pf" id="q-prog" style="width:0%"></div></div>
  <div class="plbl" id="q-lbl">第 1 / 10 题</div>
  <div class="qq" id="q-q"></div>
  <div id="q-listen" style="margin-bottom:10px"></div>
  <div class="qopts" id="q-opts"></div>
  <div class="qfb" id="q-fb"></div>
  <button class="qnxt" id="q-nxt" onclick="nextQuiz()">下一题 →</button>
</div>
<div id="screen-convo" class="screen">
  <div class="slbl">情景对话</div>
  <div id="convo-sel" style="margin-bottom:12px"></div>
  <div class="cwrap" id="cwrap"></div>
  <div id="copts"></div>
  <div id="cnote"></div>
</div>
<div id="screen-phrase" class="screen">
  <div class="sw">
    <svg class="si" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3"/></svg>
    <input type="text" placeholder="搜索印尼语或中文..." oninput="searchPhrase(this.value)">
  </div>
  <div id="phrase-list"></div>
</div>

let currentTopic=0,flashCards=[],flashOrder=[],flashIdx=0,known=new Set();
let quizCards=[],quizOrder=[],quizIdx=0,quizCorrect=0,quizTotal=0;
let convoIdx=0,convoStep=0,convoTurns=0,isDailyMode=false,currentAudio=null,streak=0;

function speak(text,btnEl){
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  document.querySelectorAll('.spk.playing').forEach(b=>b.classList.remove('playing'));
  if(btnEl)btnEl.classList.add('playing');
  const url='https://translate.google.com/translate_tts?ie=UTF-8&tl=id&client=tw-ob&q='+encodeURIComponent(text);
  const audio=new Audio(url);currentAudio=audio;audio.playbackRate=0.9;
  audio.onended=()=>{if(btnEl)btnEl.classList.remove('playing');currentAudio=null;};
  audio.onerror=()=>{if(btnEl)btnEl.classList.remove('playing');fbSpeak(text);};
  audio.play().catch(()=>fbSpeak(text));
}
function fbSpeak(text){
  if(!('speechSynthesis'in window))return;
  const u=new SpeechSynthesisUtterance(text);u.lang='id-ID';u.rate=0.8;
  const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith('id'));if(v)u.voice=v;
  speechSynthesis.speak(u);
}
function mkSpk(text,small){
  const safe=text.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  return `<button class="spk" style="font-size:${small?'10px':'11px'}" onclick="event.stopPropagation();speak('${safe}',this)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 5.5h2.5L8 2.5v11L4.5 10.5H2z"/><path d="M10 5.5c1.1.6 1.8 1.7 1.8 3s-.7 2.4-1.8 3"/></svg>听</button>`;
}
function detectVoice(){
  const p=document.getElementById('vpill'),l=document.getElementById('vlbl');
  const a=new Audio('https://translate.google.com/translate_tts?ie=UTF-8&tl=id&client=tw-ob&q=halo');
  a.oncanplay=()=>{p.className='vpill ok';l.textContent='Google印尼语语音·发音准确';};
  a.onerror=()=>{p.className='vpill warn';l.textContent='网络受限，使用系统备用语音';};
  a.load();
}
function buildGrid(){
  document.getElementById('topic-grid').innerHTML=TOPICS.map((t,i)=>{
    const done=t.words.filter(w=>known.has(i+':'+w.id)).length;
    const pct=Math.round((done/t.words.length)*100);
    return `<div class="tc ${i===currentTopic?'sel':''}" onclick="selectTopic(${i},this)">
      <div class="tc-icon">${t.icon}</div><div class="tc-name">${t.name}</div>
      <div class="tc-count">${t.words.length}个词</div>
      ${done>0?`<div class="tc-prog">${pct}%</div>`:''}
    </div>`;
  }).join('');
}
function selectTopic(i,el){currentTopic=i;isDailyMode=false;document.querySelectorAll('.tc').forEach(c=>c.classList.remove('sel'));el.classList.add('sel');}
function startDaily(){
  isDailyMode=true;
  const today=new Date().toDateString();
  let d=parseInt(localStorage.getItem('bb_day')||'0');
  if(localStorage.getItem('bb_lastday')!==today){d=(d+1)%50;localStorage.setItem('bb_day',d);localStorage.setItem('bb_lastday',today);}
  const all=TOPICS.flatMap((t,ti)=>t.words.map(w=>({...w,topicIdx:ti,topicName:t.name})));
  const s=(d*10)%all.length;flashCards=[];
  for(let i=0;i<10;i++)flashCards.push(all[(s+i)%all.length]);
  document.getElementById('daily-desc').textContent=`今日第${d+1}/50组·共10个词`;
  showScreen('flash');
}
function updateHome(){
  document.getElementById('h-known').textContent=known.size;
  document.getElementById('h-acc').textContent=quizTotal>0?Math.round((quizCorrect/quizTotal)*100)+'%':'—';
  document.getElementById('h-streak').textContent=streak;
  document.getElementById('h-pct').textContent=Math.round((known.size/500)*100)+'%';
  buildGrid();
}
function initFlash(){
  if(!isDailyMode)flashCards=TOPICS[currentTopic].words.map(w=>({...w,topicIdx:currentTopic,topicName:TOPICS[currentTopic].name}));
  flashOrder=[...Array(flashCards.length).keys()].sort(()=>Math.random()-.5);flashIdx=0;showCard();
}
function showCard(){
  const pct=Math.round((flashIdx/flashCards.length)*100);
  document.getElementById('f-prog').style.width=pct+'%';
  document.getElementById('f-lbl').textContent=`第${flashIdx+1}/${flashCards.length}张·${isDailyMode?'每日学习':TOPICS[currentTopic].name}`;
  const c=flashCards[flashOrder[flashIdx%flashOrder.length]];
  document.getElementById('f-word').textContent=c.id;
  document.getElementById('f-zh').textContent=c.zh;
  document.getElementById('f-pron').textContent=c.pron;
  document.getElementById('f-cat').textContent=c.topicName||'';
  document.getElementById('fc').classList.remove('flipped');
  document.getElementById('spk-flash').classList.remove('playing');
}
function flipCard(){document.getElementById('fc').classList.add('flipped');}
function speakCurrent(){speak(flashCards[flashOrder[flashIdx%flashOrder.length]].id,document.getElementById('spk-flash'));}
function cardResult(know){
  const c=flashCards[flashOrder[flashIdx%flashOrder.length]];
  const key=(c.topicIdx!==undefined?c.topicIdx:currentTopic)+':'+c.id;
  if(know)known.add(key);else known.delete(key);
  flashIdx++;if(flashIdx>=flashCards.length){flashIdx=0;flashOrder.sort(()=>Math.random()-.5);}
  showCard();updateHome();saveProgress();
}
function initQuiz(){
  quizCards=TOPICS[currentTopic].words;
  quizOrder=[...Array(quizCards.length).keys()].sort(()=>Math.random()-.5);
  quizIdx=0;quizCorrect=0;quizTotal=0;showQuiz();
}
function showQuiz(){
  if(quizIdx>=quizCards.length){
    document.getElementById('q-q').textContent=`本轮完成！正确率${Math.round((quizCorrect/quizTotal)*100)}%`;
    document.getElementById('q-opts').innerHTML='<button class="btn-p" onclick="initQuiz()" style="grid-column:1/-1">再来一轮</button>';
    document.getElementById('q-fb').textContent='';document.getElementById('q-nxt').style.display='none';
    document.getElementById('q-listen').innerHTML='';document.getElementById('q-prog').style.width='100%';return;
  }
  document.getElementById('q-prog').style.width=Math.round((quizIdx/quizCards.length)*100)+'%';
  document.getElementById('q-lbl').textContent=`第${quizIdx+1}/${quizCards.length}题`;
  const correct=quizCards[quizOrder[quizIdx]];
  const mode=Math.random()>.45?'zh2id':'listen';
  if(mode==='listen'){
    document.getElementById('q-q').textContent='听发音，选出对应的印尼语：';
    document.getElementById('q-listen').innerHTML=mkSpk(correct.id,false)+' <span style="font-size:11px;color:var(--t3)">点击播放</span>';
    setTimeout(()=>speak(correct.id),300);
  }else{document.getElementById('q-q').textContent=`"${correct.zh}"用印尼语怎么说？`;document.getElementById('q-listen').innerHTML='';}
  let pool=quizCards.filter(c=>c.id!==correct.id).sort(()=>Math.random()-.5).slice(0,3);
  let opts=[correct,...pool].sort(()=>Math.random()-.5);
  document.getElementById('q-fb').textContent='';document.getElementById('q-nxt').style.display='none';
  document.getElementById('q-opts').innerHTML=opts.map(o=>{
    const s=o.id.replace(/'/g,"\\'"),cs=correct.id.replace(/'/g,"\\'");
    return `<div class="qopt" onclick="checkQuiz(this,'${s}','${cs}','${correct.pron}')"><div>${o.id}</div><div style="margin-top:4px">${mkSpk(o.id,true)}</div></div>`;
  }).join('');
}
function checkQuiz(el,chosen,correct,pron){
  if(el.classList.contains('disabled'))return;quizTotal++;
  document.querySelectorAll('.qopt').forEach(o=>{o.classList.add('disabled');if(o.querySelector('div').textContent.trim()===correct)o.classList.add('correct');});
  if(chosen===correct){quizCorrect++;el.classList.add('correct');document.getElementById('q-fb').textContent='✓ 正确！'+pron;}
  else{el.classList.add('wrong');document.getElementById('q-fb').textContent='✗ 正确：'+correct+'·'+pron;}
  speak(correct);document.getElementById('q-nxt').style.display='block';updateHome();saveProgress();
}
function nextQuiz(){quizIdx++;showQuiz();}
function initConvo(){
  document.getElementById('convo-sel').innerHTML=CONVOS.map((c,i)=>
    `<button class="nb ${i===convoIdx?'active':''}" style="margin-right:6px;margin-bottom:6px" onclick="selectConvo(${i})">${c.title}</button>`
  ).join('');
  convoStep=0;document.getElementById('cwrap').innerHTML='';document.getElementById('copts').innerHTML='';document.getElementById('cnote').innerHTML='';
  renderConvo();
}
function selectConvo(i){convoIdx=i;initConvo();}
function renderConvo(){
  const steps=CONVOS[convoIdx].steps,step=steps[convoStep];if(!step)return;
  const wrap=document.getElementById('cwrap');
  if(step.who==='id'){
    const b=document.createElement('div');b.className='bub bub-id';
    b.innerHTML=`<div style="font-weight:500">${step.text}</div><div class="bub-trans">${step.trans}</div><div style="margin-top:6px">${mkSpk(step.text,true)}</div>`;
    wrap.appendChild(b);speak(step.text);convoStep++;setTimeout(renderConvo,700);
  }else{
    document.getElementById('copts').innerHTML='<div class="slbl" style="margin-bottom:8px">选择你的回答：</div>'+
      step.opts.map((o,i)=>{const s=o.note.replace(/'/g,"\\'");return `<button class="copt" onclick="pickConvo(${i},'${s}')">${o.text}<div style="margin-top:4px">${mkSpk(o.text,true)}</div></button>`;}).join('');
  }
}
function pickConvo(i,note){
  const step=CONVOS[convoIdx].steps[convoStep];
  document.querySelectorAll('.copt').forEach((b,bi)=>{b.disabled=true;b.style.cursor='default';if(bi===i)b.classList.add('picked');else b.style.opacity='0.4';});
  const wrap=document.getElementById('cwrap');
  const b=document.createElement('div');b.className='bub bub-you';b.textContent=step.opts[i].text;
  wrap.appendChild(b);speak(step.opts[i].text);
  document.getElementById('cnote').innerHTML=`<div class="cnote">${note}</div>`;
  convoTurns++;convoStep++;
  setTimeout(()=>{
    document.getElementById('copts').innerHTML='';document.getElementById('cnote').innerHTML='';
    if(convoStep<CONVOS[convoIdx].steps.length)renderConvo();
    else document.getElementById('copts').innerHTML='<div style="text-align:center;padding:12px;color:var(--t3);font-size:13px">🎉 对话完成！</div><button class="btn-p" onclick="initConvo()">再练一次</button>';
    updateHome();
  },600);
}
function renderPhrase(filter){
  let html='';
  PHRASES.forEach(sec=>{
    const items=filter?sec.items.filter(p=>p.id.toLowerCase().includes(filter)||p.zh.includes(filter)):sec.items;
    if(!items.length)return;
    html+=`<div class="pcat">${sec.cat}</div>`;
    items.forEach(p=>{
      const s=p.id.replace(/'/g,"\\'");
      html+=`<div class="pitem"><div class="ptexts"><div class="pid">${p.id}</div><div class="pzh">${p.zh}</div><div class="ppron">${p.pron}</div></div><button class="spk" onclick="speak('${s}',this)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 5.5h2.5L8 2.5v11L4.5 10.5H2z"/><path d="M10 5.5c1.1.6 1.8 1.7 1.8 3s-.7 2.4-1.8 3"/></svg>听</button></div>`;
    });
  });
  document.getElementById('phrase-list').innerHTML=html||'<div style="color:var(--t3);text-align:center;padding:20px;font-size:13px">没有找到相关短语</div>';
}
function searchPhrase(val){renderPhrase(val.toLowerCase());}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  const idx=['home','flash','quiz','convo','phrase'].indexOf(id);
  if(idx>=0)document.querySelectorAll('.nb')[idx].classList.add('active');
  if(id==='flash')initFlash();if(id==='quiz')initQuiz();if(id==='convo')initConvo();
  if(id==='phrase')renderPhrase();if(id==='home'){isDailyMode=false;updateHome();}
}
function saveProgress(){
  try{
    localStorage.setItem('bb_known',JSON.stringify([...known]));
    localStorage.setItem('bb_qc',quizCorrect);localStorage.setItem('bb_qt',quizTotal);localStorage.setItem('bb_convo',convoTurns);
    const today=new Date().toDateString();
    if(localStorage.getItem('bb_studyday')!==today){localStorage.setItem('bb_studyday',today);streak++;localStorage.setItem('bb_streak',streak);}
  }catch(e){}
}
function loadProgress(){
  try{
    const k=localStorage.getItem('bb_known');if(k)known=new Set(JSON.parse(k));
    quizCorrect=parseInt(localStorage.getItem('bb_qc')||'0');quizTotal=parseInt(localStorage.getItem('bb_qt')||'0');
    convoTurns=parseInt(localStorage.getItem('bb_convo')||'0');streak=parseInt(localStorage.getItem('bb_streak')||'0');
  }catch(e){}
}
loadProgress();detectVoice();updateHome();
setInterval(saveProgress,10000);window.addEventListener('beforeunload',saveProgress);
</script>
